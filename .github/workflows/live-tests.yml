name: live free-platform tests

on:
  schedule:
    # Daily at 9:00 UTC — low-frequency to avoid hitting rate limits.
    - cron: '0 9 * * *'
  workflow_dispatch: {}

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}
      - name: Smoke DuckDuckGo
        run: cargo test --test live_search test_duckduckgo_smoke --features mcp -- --ignored --test-threads=1 --nocapture
        env:
          HTTPS_PROXY: ""
          HTTP_PROXY: ""
      - name: Smoke Wikipedia
        run: cargo test --test live_search test_wikipedia_smoke --features mcp -- --ignored --test-threads=1 --nocapture
        env:
          HTTPS_PROXY: ""
          HTTP_PROXY: ""
