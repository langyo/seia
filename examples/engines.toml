# seia custom engine configuration — example
#
# Place this file at ~/.seia/engines.toml (user-global) or ./seia.toml
# (project-local).  Define any number of custom search engines under
# the [engines.<name>] sections below.
#
# Supported template variables:
#   {{query}} — URL-encoded search term
#   {{limit}} — max-results count
#   ${ENV_VAR} — environment variable substitution
#
# JSONPath result_path examples:
#   $.items[*]        — array under "items" key
#   $.data.results[*] — nested array
#   (absent)          — root JSON is treated as the result list or object

# ── GitHub Code Search ───────────────────────────────────────────
[engines.github]
label = "GitHub Code Search"
method = "GET"
url = "https://api.github.com/search/code"
query_param = "q"
headers = { Authorization = "Bearer ${GITHUB_TOKEN}", Accept = "application/vnd.github.v3+json" }
result_path = "$.items[*]"
title_field = "name"
url_field = "html_url"
snippet_field = "repository.full_name"

# ── npm Registry Search ──────────────────────────────────────────
[engines.npm]
label = "npm Registry"
method = "GET"
url = "https://registry.npmjs.org/-/v1/search"
query_param = "text"
result_path = "$.objects[*].package"
title_field = "name"
url_field = "links.npm"
snippet_field = "description"

# ── crates.io Search ─────────────────────────────────────────
[engines.crates-io]
label = "crates.io"
method = "GET"
url = "https://crates.io/api/v1/crates"
query_param = "q"
result_path = "$.crates[*]"
title_field = "name"
url_field = "homepage"
snippet_field = "description"

# ── Stack Exchange (Stack Overflow) ───────────────────────────
[engines.stackoverflow]
label = "Stack Overflow"
method = "GET"
url = "https://api.stackexchange.com/2.3/search/advanced"
query_param = "q"
limit_param = "pagesize"
headers = { Accept = "application/json" }
result_path = "$.items[*]"
title_field = "title"
url_field = "link"
snippet_field = "owner.display_name"

# ── Postman Echo (for testing) ───────────────────────────────────
[engines.postman-echo]
label = "Postman Echo (Test)"
method = "GET"
url = "https://postman-echo.com/get"
query_param = "q"
result_path = "$.args"

