[book]
title = "seia 文件"
description = "通用搜尋引擎抽象層 —— 支援 API 模式與無頭瀏覽器模式的多後端 Web 搜尋"
authors = ["celestia-island"]
language = "zh-TW"
src = "."

[build]
build-dir = "../../target/docs/zh-hant"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/seia"
edit-url-template = "https://github.com/celestia-island/seia/edit/dev/docs/zh-hant/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
