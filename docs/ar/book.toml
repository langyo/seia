[book]
title = "وثائق seia"
description = "طبقة تجريد عالمية لمحركات البحث — بحث ويب متعدد الواجهات الخلفية بأنماط API ومتصفح مقطوع الرأس"
authors = ["celestia-island"]
language = "ar"
src = "."

[build]
build-dir = "../../target/docs/ar"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/seia"
edit-url-template = "https://github.com/celestia-island/seia/edit/dev/docs/ar/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
