[book]
title = "Документация seia"
description = "Универсальная абстракция поисковых движков — веб-поиск с многими бэкендами в режимах API и headless-браузера"
authors = ["celestia-island"]
language = "ru"
src = "."

[build]
build-dir = "../../target/docs/ru"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/seia"
edit-url-template = "https://github.com/celestia-island/seia/edit/dev/docs/ru/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
