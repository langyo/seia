[book]
title = "Documentation de seia"
description = "Abstraction universelle de moteurs de recherche — recherche web multi-backends avec modes API et navigateur headless"
authors = ["celestia-island"]
language = "fr"
src = "."

[build]
build-dir = "../../target/docs/fr"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/seia"
edit-url-template = "https://github.com/celestia-island/seia/edit/dev/docs/fr/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
